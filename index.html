<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Pacientes</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 20px;
    }

    form {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 320px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #4facfe;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #msg {
      margin-top: 10px;
      font-size: 14px;
    }

    #lista-pacientes {
      margin-top: 20px;
      width: 350px;
    }

    .paciente {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .paciente input {
      margin: 5px 0;
    }

    .paciente button {
      width: 48%;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <form id="form-paciente">
    <h2>Cadastrar Paciente</h2>
    <input type="text" id="nome" required placeholder="Nome completo">
    <input type="tel" id="celular" required placeholder="(99) 99999-9999">
    <button type="submit">Cadastrar</button>
    <p id="msg"></p>
  </form>

  <h3>Pacientes Cadastrados</h3>
  <div id="lista-pacientes"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="/pacientes/app.js"></script>

</body>
</html>
